name: Build & Deploy YDAPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ydapi:latest -f Dockerfile .

      - name: Save image as tar
        run: |
          docker save ydapi:latest | gzip > ydapi-image.tar.gz

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "ydapi-image.tar.gz"
          target: "/opt/ydapi/"
          timeout: 120s
          command_timeout: 30m

      - name: Load image and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            cd /opt/ydapi
            docker load < ydapi-image.tar.gz
            rm -f ydapi-image.tar.gz
            docker compose up -d --force-recreate ydapi
            sleep 10
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep ydapi
            # Restore YDAPI brand settings after deploy
            bash /opt/ydapi/scripts/init-settings.sh || true
